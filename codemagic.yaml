# codemagic.yaml
# A.I.S.A. L2 - Omi Fork iOS ビルド設定
#
# 前提:
#   - このファイルをOmi ForkリポジトリのROOTに配置する（A.I.S.A.プロジェクトではない）
#   - Codemagic (codemagic.io) でOmi ForkのGitHubリポジトリを登録する
#   - 無料プラン: 500分/月（初回ビルドは依存解決で30〜40分かかる）
#
# ビルド成果物:
#   - 署名なし .ipa ファイル（Sideloadlyで注入）
#
# Codemagicダッシュボード → Environment variables → aisa_secrets グループに設定すること:
#   FIREBASE_OPTIONS_DEV  = firebase_options_dev.dart の内容をBase64エンコードした文字列
#   FIREBASE_OPTIONS_PROD = firebase_options_prod.dart の内容をBase64エンコードした文字列
#
# フレーバーについて:
#   Omiアプリは `dev` / `prod` の2フレーバー構成（Xcodeスキーム対応）
#   本設定は `dev` フレーバーでビルドする

workflows:
  aisa-ios-unsigned:
    name: "A.I.S.A. iOS (Unsigned IPA - dev flavor)"
    max_build_duration: 90

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - aisa_secrets

    scripts:
      - name: Firebase設定ファイルを復元
        script: |
          echo "$FIREBASE_OPTIONS_DEV"  | base64 --decode > app/lib/firebase_options_dev.dart
          echo "$FIREBASE_OPTIONS_PROD" | base64 --decode > app/lib/firebase_options_prod.dart
          echo "Firebase設定ファイルを復元しました"

      - name: Flutter依存関係インストール
        script: |
          cd app
          flutter pub get

      - name: 環境変数ファイルと生成コードを準備（envied / build_runner）
        script: |
          cd app
          # prod_env.dart は path: '.env'、dev_env.dart は path: '.dev.env' を参照する
          # allowOptionalFields: true のため空ファイルで問題なし
          cp .env.template .env
          cp .env.template .dev.env
          # _ProdEnv / _DevEnv クラスと l10n / assets を一括生成
          dart run build_runner build --delete-conflicting-outputs

      - name: GoogleService-Info.plist を ios/Config/Dev・Prod に配置
        script: |
          # Xcodeの "Copy Google Plist file" スクリプトが以下を参照する:
          #   Release-dev → ${PROJECT_DIR}/Config/Dev/GoogleService-Info.plist
          #   Release-prod → ${PROJECT_DIR}/Config/Prod/GoogleService-Info.plist
          mkdir -p app/ios/Config/Dev
          mkdir -p app/ios/Config/Prod
          cp app/setup/prebuilt/GoogleService-Info.plist app/ios/Config/Dev/GoogleService-Info.plist
          cp app/setup/prebuilt/GoogleService-Info.plist app/ios/Config/Prod/GoogleService-Info.plist
          echo "GoogleService-Info.plist を Config/Dev・Prod に配置しました"

      - name: CocoaPods インストール
        script: |
          cd app/ios
          # --repo-update を外す: flutter pub get が生成した .symlinks のspecを使う
          # --repo-update を付けると Firebase SDK を GitHub から直接 clone しようとして失敗する
          pod install

      - name: Flutterビルド（unsigned・devフレーバー）
        script: |
          cd app
          flutter build ios \
            --flavor dev \
            --release \
            --no-codesign

      - name: .ipa パッケージング（Payload形式）
        script: |
          APP_PATH="$(find app/build/ios/iphoneos -name '*.app' | head -1)"
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: .app が見つかりません"
            exit 1
          fi
          echo "パッケージング対象: $APP_PATH"
          mkdir -p build/ios/ipa/Payload
          cp -r "$APP_PATH" build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r ../Runner-unsigned.ipa Payload/

    artifacts:
      - build/ios/Runner-unsigned.ipa

    publishing:
      email:
        recipients:
          - your-email@example.com  # ← ご自身のメールアドレスに変更
        notify:
          success: true
          failure: true
