workflows:
  aisa-ios-unsigned:
    name: "A.I.S.A. iOS (Unsigned IPA)"
    max_build_duration: 90
    instance_type: mac_mini_m2
    working_directory: app

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $HOME/Library/Caches/CocoaPods

    scripts:
      - name: Flutter依存関係インストール
        script: flutter pub get

      - name: Flutter iOSビルド（署名なし・devフレーバー）
        script: |
          flutter build ios \
            --release \
            --no-codesign \
            --flavor dev

      - name: .ipa パッケージング
        script: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r ../../Runner-unsigned.ipa Payload/

    artifacts:
      - build/Runner-unsigned.ipa
